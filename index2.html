<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyOW Chat</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b141a;
    color:white;
}

/* HEADER tipo WhatsApp */
.header {
    background:#202c33;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header input {
    background:#2a3942;
    border:none;
    color:white;
    padding:8px;
    border-radius:20px;
}

/* TABS */
.tabs {
    display:flex;
    background:#202c33;
}

.tab-btn {
    flex:1;
    padding:10px;
    border:none;
    background:none;
    color:#aaa;
    cursor:pointer;
}

.tab-btn.active {
    color:#25d366;
    border-bottom:2px solid #25d366;
}

/* LISTA contactos */
.device-list {
    height:200px;
    overflow:auto;
}

.device-item {
    padding:10px;
    border-bottom:1px solid #222;
    display:flex;
    justify-content:space-between;
}

/* CHAT */
.chat-box {
    height:300px;
    overflow:auto;
    background:#111;
    padding:10px;
}

.msg {
    padding:6px 10px;
    margin:5px;
    border-radius:10px;
    max-width:70%;
}

.sent {
    background:#005c4b;
    margin-left:auto;
}

.received {
    background:#202c33;
}

input,button {
    outline:none;
}

/* VIDEO */
video {
    width:100%;
    max-height:200px;
    background:black;
}

/* BOTONES */
.btn {
    background:#25d366;
    border:none;
    padding:8px 12px;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <input id="phoneInput" placeholder="Tu número">
    <button id="setPhoneBtn" class="btn">OK</button>
</div>

<div class="tabs">
    <button class="tab-btn active" data-tab="video">📹</button>
    <button class="tab-btn" data-tab="audio">🎙</button>
    <button class="tab-btn" data-tab="chat">💬</button>
    <button class="tab-btn" data-tab="group">👥</button>
</div>

<!-- VIDEO -->
<div id="videoTab">
    <ul id="videoDeviceList" class="device-list"></ul>
    <video id="videoLocal" autoplay muted></video>
    <video id="videoRemote" autoplay></video>
    <button id="videoHangup">Colgar</button>
</div>

<!-- AUDIO -->
<div id="audioTab" style="display:none">
    <ul id="audioDeviceList" class="device-list"></ul>
    <button id="audioHangup">Colgar</button>
</div>

<!-- CHAT -->
<div id="chatTab" style="display:none">
    <ul id="chatDeviceList" class="device-list"></ul>

    <div id="chatMessages" class="chat-box"></div>

    <input id="chatInput">
    <button id="chatSendBtn">Enviar</button>
</div>

<!-- GROUP -->
<div id="groupTab" style="display:none">
    <input id="groupRoomId">
    <button id="groupCreateBtn">Crear</button>
    <button id="groupJoinBtn">Unirse</button>

    <div id="groupVideoGrid"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIza...",
    databaseURL: "https://myow-cdb46-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* TURN */
const iceServers = [
    { urls:"stun:stun.l.google.com:19302"},
    {
        urls:"turn:global.turn.metered.live:3478",
        username:"6add749aa39bded58851f0d5",
        credential:"TF2Z0iD5X45aIWpX"
    }
];

let myId = Math.random().toString(36).substr(2,9);
let myPhone = "";

/* -------- REGISTRO -------- */
document.getElementById("setPhoneBtn").onclick=()=>{
    myPhone=document.getElementById("phoneInput").value;
    set(ref(db,"presence/"+myId),{phone:myPhone});
};

/* -------- VIDEO -------- */
let pc;

async function callUser(id){
    pc=new RTCPeerConnection({iceServers});

    const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    document.getElementById("videoLocal").srcObject=stream;

    stream.getTracks().forEach(t=>pc.addTrack(t,stream));

    pc.ontrack=e=>{
        document.getElementById("videoRemote").srcObject=e.streams[0];
    };

    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);

    set(ref(db,"calls/"+myId),{offer:offer.sdp,to:id});
}

/* LISTA */
onValue(ref(db,"presence"),snap=>{
    let html="";
    snap.forEach(c=>{
        if(c.key!==myId){
            html+=`<li class="device-item">${c.val().phone}
            <button onclick="callUser('${c.key}')">Llamar</button></li>`;
        }
    });
    videoDeviceList.innerHTML=html;
});

/* -------- CHAT -------- */
let dc;

async function connectChat(id){
    pc=new RTCPeerConnection({iceServers});
    dc=pc.createDataChannel("chat");

    dc.onmessage=e=>{
        chatMessages.innerHTML+=`<div class="msg received">${e.data}</div>`;
    };

    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);

    set(ref(db,"chat/"+myId),{offer:offer.sdp,to:id});
}

chatSendBtn.onclick=()=>{
    dc.send(chatInput.value);
    chatMessages.innerHTML+=`<div class="msg sent">${chatInput.value}</div>`;
};

/* -------- TABS -------- */
document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        ["video","audio","chat","group"].forEach(t=>{
            document.getElementById(t+"Tab").style.display="none";
        });

        document.getElementById(btn.dataset.tab+"Tab").style.display="block";
    };
});

/* -------- PWA -------- */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

</script>
</body>
</html>
