<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyOW WhatsApp Style</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#25d366">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b141a;
    color:white;
}

/* HEADER */
.header {
    background:#202c33;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.user-area {
    display:flex;
    gap:10px;
}

.user-area input {
    background:#2a3942;
    border:none;
    color:white;
    padding:8px;
    border-radius:20px;
}

.user-area button {
    background:#25d366;
    border:none;
    padding:8px 12px;
    border-radius:20px;
}

/* TABS */
.tabs {
    display:flex;
    background:#202c33;
}

.tab-btn {
    flex:1;
    padding:10px;
    border:none;
    background:none;
    color:#aaa;
}

.tab-btn.active {
    color:#25d366;
    border-bottom:2px solid #25d366;
}

/* LISTA */
.device-list {
    max-height:150px;
    overflow:auto;
}

.device-item {
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #222;
}

.call-btn {
    background:#25d366;
    border:none;
    padding:6px 10px;
    border-radius:20px;
}

/* VIDEO */
.video-container {
    display:flex;
    gap:10px;
}

video {
    width:100%;
    max-height:200px;
    background:black;
}

/* CHAT */
.chat-messages {
    height:250px;
    overflow:auto;
    background:#111b21;
    padding:10px;
}

.message {
    margin:5px;
    padding:8px;
    border-radius:10px;
    max-width:70%;
}

.sent {
    background:#005c4b;
    margin-left:auto;
}

.received {
    background:#202c33;
}

.chat-input {
    display:flex;
    gap:10px;
}

.chat-input input {
    flex:1;
    background:#2a3942;
    border:none;
    color:white;
    padding:10px;
    border-radius:20px;
}

.chat-input button {
    background:#25d366;
    border:none;
    padding:10px;
    border-radius:20px;
}

/* BOTONES */
.action-btn {
    background:red;
    border:none;
    padding:10px;
    border-radius:20px;
}

.warning {
    background:#25d366;
}
</style>
</head>

<body>

<div class="header">
    <div class="user-area">
        <input id="phoneInput" placeholder="Tu número">
        <button id="setPhoneBtn">OK</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" data-tab="video">📹</button>
    <button class="tab-btn" data-tab="audio">🎙</button>
    <button class="tab-btn" data-tab="chat">💬</button>
</div>

<!-- VIDEO -->
<div id="videoTab">
    <ul id="videoDeviceList" class="device-list"></ul>

    <div class="video-container">
        <video id="videoLocal" autoplay muted></video>
        <video id="videoRemote" autoplay></video>
    </div>

    <button id="videoHangup" class="action-btn">Colgar</button>
</div>

<!-- AUDIO -->
<div id="audioTab" style="display:none">
    <ul id="audioDeviceList" class="device-list"></ul>
    <button id="audioHangup" class="action-btn">Colgar</button>
</div>

<!-- CHAT -->
<div id="chatTab" style="display:none">
    <ul id="chatDeviceList" class="device-list"></ul>

    <div id="chatMessages" class="chat-messages"></div>

    <div class="chat-input">
        <input id="chatInput">
        <button id="chatSendBtn">Enviar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    databaseURL: "https://myow-cdb46-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const iceServers = [
    { urls: "stun:stun.l.google.com:19302" },
    {
        urls: "turn:global.turn.metered.live:3478",
        username: "6add749aa39bded58851f0d5",
        credential: "TF2Z0iD5X45aIWpX"
    }
];

let myId = Math.random().toString(36).substr(2,9);
let myPhone = "";

/* REGISTRO */
setPhoneBtn.onclick = () => {
    myPhone = phoneInput.value;
    set(ref(db, "presence/" + myId), { phone: myPhone });
};

/* LISTA */
function loadList(path, element, action){
    onValue(ref(db, path), snap=>{
        let html="";
        snap.forEach(c=>{
            if(c.key !== myId){
                html+=`<li class="device-item">${c.val().phone}
                <button class="call-btn" onclick="${action}('${c.key}')">OK</button></li>`;
            }
        });
        element.innerHTML = html;
    });
}

loadList("presence", videoDeviceList, "callVideo");
loadList("presence", audioDeviceList, "callAudio");
loadList("presence", chatDeviceList, "callChat");

/* VIDEO */
let pc;

window.callVideo = async(id)=>{
    pc = new RTCPeerConnection({iceServers});
    const stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    videoLocal.srcObject = stream;
    stream.getTracks().forEach(t=>pc.addTrack(t,stream));

    pc.ontrack = e=> videoRemote.srcObject = e.streams[0];

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    set(ref(db,"calls/"+myId), {offer:offer.sdp,to:id});
};

/* CHAT */
let dc;

window.callChat = async(id)=>{
    pc = new RTCPeerConnection({iceServers});
    dc = pc.createDataChannel("chat");

    dc.onmessage = e=>{
        chatMessages.innerHTML += `<div class="message received">${e.data}</div>`;
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    set(ref(db,"chat/"+myId), {offer:offer.sdp,to:id});
};

chatSendBtn.onclick = ()=>{
    dc.send(chatInput.value);
    chatMessages.innerHTML += `<div class="message sent">${chatInput.value}</div>`;
};

/* TABS */
document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        ["video","audio","chat"].forEach(t=>{
            document.getElementById(t+"Tab").style.display="none";
        });

        document.getElementById(btn.dataset.tab+"Tab").style.display="block";
    };
});

/* PWA */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
