<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyOW PWA</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: sans-serif; background:#0a0f1c; color:white; text-align:center; }
input,button { padding:10px; margin:5px; border-radius:20px; border:none; }
button { background:#3b82f6; color:white; font-weight:bold; }
video { width:45%; margin:5px; border-radius:12px; }
#incoming { background:#f97316; padding:10px; border-radius:20px; display:none; }
</style>
</head>

<body>

<h2>📞 MyOW WhatsApp Style</h2>

<input id="myNumber" placeholder="Tu número">
<button onclick="register()">Registrar</button>

<br><br>

<input id="callNumber" placeholder="Número a llamar">
<button onclick="call()">📞 Llamar</button>

<div id="incoming"></div>

<br>

<video id="local" autoplay muted playsinline></video>
<video id="remote" playsinline></video>

<br>
<button onclick="playRemote()">▶️ Play</button>
<button onclick="hangup()">❌ Colgar</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://myow-cdb46-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

let myId = localStorage.getItem("id") || crypto.randomUUID();
localStorage.setItem("id", myId);

let myPhone = "";
let pc, localStream, callId;

const iceServers = [
 { urls: "stun:stun.l.google.com:19302" },
 {
  urls: [
   "turn:global.turn.metered.live:3478",
   "turn:global.turn.metered.live:443"
  ],
  username: "6add749aa39bded58851f0d5",
  credential: "TF2Z0iD5X45aIWpX"
 }
];

function log(t){console.log(t)}

// ---------- REGISTRO ----------
window.register = async () => {
  myPhone = document.getElementById("myNumber").value;

  await set(ref(db, "users/"+myPhone), {
    id: myId
  });

  onDisconnect(ref(db, "users/"+myPhone)).remove();

  listenIncoming();
  alert("Registrado ✅");
};

// ---------- STREAM ----------
async function getStream(){
  if(localStream) return localStream;
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  document.getElementById("local").srcObject = localStream;
}

// ---------- PC ----------
function createPC(){
  pc = new RTCPeerConnection({iceServers});

  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack = e=>{
    document.getElementById("remote").srcObject = e.streams[0];
  };

  pc.onconnectionstatechange = ()=>{
    log(pc.connectionState);
  };
}

// ---------- LLAMAR ----------
window.call = async () => {
  let num = document.getElementById("callNumber").value;

  const snap = await new Promise(res=>{
    onValue(ref(db,"users/"+num), s=>res(s.val()),{onlyOnce:true});
  });

  if(!snap){ alert("No existe"); return; }

  await getStream();
  createPC();

  let offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await waitICE();

  callId = push(ref(db,"calls")).key;

  await set(ref(db,"calls/"+callId),{
    to:num,
    from:myPhone,
    offer:pc.localDescription.sdp
  });

  onValue(ref(db,"calls/"+callId+"/answer"), async s=>{
    if(s.val()){
      await pc.setRemoteDescription({
        type:"answer",
        sdp:s.val()
      });
    }
  });
};

// ---------- RECIBIR ----------
function listenIncoming(){
  onValue(ref(db,"calls"), snap=>{
    let data = snap.val();
    if(!data) return;

    for(let id in data){
      let c = data[id];
      if(c.to===myPhone){
        showIncoming(id,c);
        break;
      }
    }
  });
}

function showIncoming(id,call){
  let div = document.getElementById("incoming");
  div.style.display="block";
  div.innerHTML = `
    📞 ${call.from}
    <button onclick="accept('${id}')">Aceptar</button>
    <button onclick="reject('${id}')">Rechazar</button>
  `;
}

// ---------- ACEPTAR ----------
window.accept = async (id)=>{
  let call = (await new Promise(res=>{
    onValue(ref(db,"calls/"+id), s=>res(s.val()),{onlyOnce:true});
  }));

  await getStream();
  createPC();

  await pc.setRemoteDescription({
    type:"offer",
    sdp:call.offer
  });

  let ans = await pc.createAnswer();
  await pc.setLocalDescription(ans);

  await waitICE();

  await set(ref(db,"calls/"+id+"/answer"), pc.localDescription.sdp);

  callId = id;
};

// ---------- RECHAZAR ----------
window.reject = async (id)=>{
  await remove(ref(db,"calls/"+id));
};

// ---------- ICE ----------
function waitICE(){
 return new Promise(res=>{
  if(pc.iceGatheringState==="complete") res();
  else pc.onicegatheringstatechange=()=>{
    if(pc.iceGatheringState==="complete") res();
  };
 });
}

// ---------- PLAY ----------
window.playRemote = ()=>{
 document.getElementById("remote").play();
};

// ---------- COLGAR ----------
window.hangup = async ()=>{
 if(callId) await remove(ref(db,"calls/"+callId));
 if(pc) pc.close();
};

</script>
</body>
</html>
