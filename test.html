<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WebRTC Test</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; margin: 0; padding: 0; }
        video { width: 45%; margin: 10px; border: 1px solid black; }
        #videos { display: flex; justify-content: center; width: 100%; }
    </style>
</head>
<body>
    <h1>WebRTC Cliente HTML5</h1>
    <div id="videos">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
        const signalingUrl = "wss://c9cc8b92-9999-4141-a186-ef5d390b338d-00-mpv778c5pccd.riker.replit.dev/ws";
        const roomId = "mi-sala";

        let localStream;
        let pc;
        const localVideo = document.getElementById("localVideo");
        const remoteVideo = document.getElementById("remoteVideo");

        const ws = new WebSocket(signalingUrl);

        ws.onopen = () => {
            console.log("WebSocket conectado ✅");
            ws.send(JSON.stringify({ type: "join", roomId: roomId }));
        };

        ws.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            switch(data.type) {
                case "offer":
                    await pc.setRemoteDescription(new RTCSessionDescription({ type: "offer", sdp: data.sdp }));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    ws.send(JSON.stringify({ type: "answer", sdp: answer.sdp }));
                    break;
                case "answer":
                    await pc.setRemoteDescription(new RTCSessionDescription({ type: "answer", sdp: data.sdp }));
                    break;
                case "ice":
                    const candidate = new RTCIceCandidate(data.candidate);
                    await pc.addIceCandidate(candidate);
                    break;
            }
        };

        async function init() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;

            pc = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({ type: "ice", candidate: event.candidate }));
                }
            };

            pc.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
            };

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // Crear oferta solo si eres el primer peer (opcional)
            // const offer = await pc.createOffer();
            // await pc.setLocalDescription(offer);
            // ws.send(JSON.stringify({ type: "offer", sdp: offer.sdp }));
        }

        init();
    </script>
</body>
</html>
