<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC manual - Copiar/Pegar SDP</title>
    <style>
        body {
            font-family: monospace;
            background: #1e1e2f;
            color: #eee;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        h2 {
            background: #2d2d3a;
            padding: 10px;
            border-radius: 8px;
        }
        .video-area {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        video {
            width: 45%;
            background: #000;
            border-radius: 12px;
            transform: scaleX(-1);
        }
        .sdp-box {
            background: #2a2a35;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-family: monospace;
            font-size: 12px;
            background: #0f0f1a;
            color: #0f0;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 10px;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            color: white;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .status {
            background: #2a2a35;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .flex {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
        }
        hr {
            margin: 20px 0;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔄 WebRTC Manual – Copiar/Pegar SDP</h1>
    <div class="video-area">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="status" id="status">Estado: Esperando permisos de cámara/mic...</div>

    <div class="flex">
        <div class="col">
            <h2>📤 Paso 1 (Llamante)</h2>
            <button id="createOfferBtn">1️⃣ Crear Oferta (con ICE)</button>
            <div class="sdp-box">
                <label>📋 Copia esta Oferta y envíala al otro usuario:</label>
                <textarea id="offerSDP" readonly placeholder="La oferta aparecerá aquí..."></textarea>
                <button id="copyOfferBtn">📋 Copiar Oferta</button>
            </div>
        </div>
        <div class="col">
            <h2>📥 Paso 2 (Receptor)</h2>
            <label>📋 Pega aquí la Oferta recibida:</label>
            <textarea id="remoteOfferInput" placeholder="Pega la oferta del otro usuario..."></textarea>
            <button id="applyOfferBtn">🔧 Aplicar Oferta y generar Respuesta</button>
            <div class="sdp-box">
                <label>📋 Copia esta Respuesta y envíala al llamante:</label>
                <textarea id="answerSDP" readonly placeholder="La respuesta aparecerá aquí..."></textarea>
                <button id="copyAnswerBtn">📋 Copiar Respuesta</button>
            </div>
        </div>
    </div>

    <hr>

    <div class="flex">
        <div class="col">
            <h2>📥 Paso 3 (Llamante)</h2>
            <label>📋 Pega aquí la Respuesta recibida:</label>
            <textarea id="remoteAnswerInput" placeholder="Pega la respuesta del otro usuario..."></textarea>
            <button id="applyAnswerBtn">🔧 Aplicar Respuesta (conectar)</button>
        </div>
    </div>

    <div id="iceStatus" class="status">🔌 ICE state: ...</div>
</div>

<script>
    // ========== CONFIGURACIÓN ICE ==========
    // Solo STUN para prueba local, pero puedes añadir TURN si quieres
    const iceServers = [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
    ];
    // Si quieres probar con TURN, descomenta y pon tus credenciales:
    /*
    const turnConfig = {
        urls: ["turn:global.turn.metered.live:3478?transport=udp","turn:global.turn.metered.live:3478?transport=tcp"],
        username: "TU_USUARIO",
        credential: "TU_CREDENCIAL"
    };
    iceServers.push(turnConfig);
    */

    // ========== VARIABLES ==========
    let pc = null;
    let localStream = null;

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const statusDiv = document.getElementById('status');
    const iceStatusDiv = document.getElementById('iceStatus');

    const createOfferBtn = document.getElementById('createOfferBtn');
    const copyOfferBtn = document.getElementById('copyOfferBtn');
    const offerSDP = document.getElementById('offerSDP');
    const remoteOfferInput = document.getElementById('remoteOfferInput');
    const applyOfferBtn = document.getElementById('applyOfferBtn');
    const answerSDP = document.getElementById('answerSDP');
    const copyAnswerBtn = document.getElementById('copyAnswerBtn');
    const remoteAnswerInput = document.getElementById('remoteAnswerInput');
    const applyAnswerBtn = document.getElementById('applyAnswerBtn');

    // ========== FUNCIONES ==========
    async function getLocalStream() {
        if (localStream) return localStream;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream = stream;
            localVideo.srcObject = stream;
            statusDiv.innerText = '✅ Cámara y micrófono listos';
            return stream;
        } catch (err) {
            statusDiv.innerText = '❌ Error al acceder a cámara/mic: ' + err.message;
            throw err;
        }
    }

    function createPeerConnection() {
        if (pc) {
            pc.close();
        }
        pc = new RTCPeerConnection({ iceServers });

        // Añadir pistas locales cuando se crea
        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        // Manejar stream remoto
        pc.ontrack = (event) => {
            if (event.streams && event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
                statusDiv.innerText = '✅ Stream remoto recibido';
            } else {
                if (!remoteVideo.srcObject) remoteVideo.srcObject = new MediaStream();
                remoteVideo.srcObject.addTrack(event.track);
            }
        };

        pc.oniceconnectionstatechange = () => {
            iceStatusDiv.innerText = `🔌 ICE connection state: ${pc.iceConnectionState}`;
            if (pc.iceConnectionState === 'connected') {
                statusDiv.innerText = '🎉 CONEXIÓN ESTABLECIDA - Video y audio en curso';
            }
        };

        pc.onconnectionstatechange = () => {
            console.log('Connection state:', pc.connectionState);
        };

        return pc;
    }

    // Espera a que ICE gathering termine y devuelve el SDP final
    async function waitForIceGathering(pc) {
        if (pc.iceGatheringState === 'complete') return;
        return new Promise((resolve) => {
            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === 'complete') {
                    resolve();
                }
            };
        });
    }

    // Llamante: crear oferta con ICE completo
    createOfferBtn.onclick = async () => {
        try {
            await getLocalStream();
            pc = createPeerConnection();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            statusDiv.innerText = 'Oferta creada, esperando recolección de ICE...';
            await waitForIceGathering(pc);
            const finalSDP = pc.localDescription.sdp;
            offerSDP.value = finalSDP;
            statusDiv.innerText = '✅ Oferta lista (con ICE). Cópiala y envíala al otro usuario.';
        } catch (err) {
            statusDiv.innerText = '❌ Error creando oferta: ' + err.message;
            console.error(err);
        }
    };

    // Copiar oferta
    copyOfferBtn.onclick = () => {
        offerSDP.select();
        document.execCommand('copy');
        statusDiv.innerText = '📋 Oferta copiada al portapapeles';
    };

    // Receptor: aplicar oferta, generar respuesta con ICE completo
    applyOfferBtn.onclick = async () => {
        const offerSDPText = remoteOfferInput.value.trim();
        if (!offerSDPText) {
            statusDiv.innerText = '⚠️ Pega una oferta primero.';
            return;
        }
        try {
            await getLocalStream();
            pc = createPeerConnection();
            const offerDesc = new RTCSessionDescription({ type: 'offer', sdp: offerSDPText });
            await pc.setRemoteDescription(offerDesc);
            statusDiv.innerText = 'Oferta aplicada, generando respuesta...';
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await waitForIceGathering(pc);
            const finalSDP = pc.localDescription.sdp;
            answerSDP.value = finalSDP;
            statusDiv.innerText = '✅ Respuesta lista (con ICE). Cópiala y envíala al llamante.';
        } catch (err) {
            statusDiv.innerText = '❌ Error aplicando oferta: ' + err.message;
            console.error(err);
        }
    };

    // Copiar respuesta
    copyAnswerBtn.onclick = () => {
        answerSDP.select();
        document.execCommand('copy');
        statusDiv.innerText = '📋 Respuesta copiada al portapapeles';
    };

    // Llamante: aplicar respuesta para completar conexión
    applyAnswerBtn.onclick = async () => {
        const answerSDPText = remoteAnswerInput.value.trim();
        if (!answerSDPText) {
            statusDiv.innerText = '⚠️ Pega una respuesta primero.';
            return;
        }
        if (!pc) {
            statusDiv.innerText = '⚠️ Primero crea una oferta (paso 1).';
            return;
        }
        try {
            const answerDesc = new RTCSessionDescription({ type: 'answer', sdp: answerSDPText });
            await pc.setRemoteDescription(answerDesc);
            statusDiv.innerText = '✅ Respuesta aplicada, estableciendo conexión...';
            // La conexión se establecerá automáticamente cuando los candidatos ICE se intercambien (ya están incluidos en SDP)
        } catch (err) {
            statusDiv.innerText = '❌ Error aplicando respuesta: ' + err.message;
            console.error(err);
        }
    };

    // Inicializar: pedir permisos al cargar
    getLocalStream().catch(console.warn);
</script>
</body>
</html>
