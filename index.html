<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Financial Funnel PRO</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial;
  background:#0b1220;
  color:white;
}

/* CHAT */
.chat{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.bubble{
  padding:12px 14px;
  margin:10px 0;
  border-radius:14px;
  display:inline-block;
  max-width:85%;
}

.bot{background:rgba(255,255,255,0.08);}
.user{background:#2563eb; float:right;}
.clear{clear:both;}

/* INPUT */
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
}

/* ADMIN PANEL */
#adminPanel{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000ee;
  padding:20px;
  overflow:auto;
}

.box{
  background:#111827;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

.smallBtn{
  background:#3b82f6;
  padding:8px;
  border-radius:8px;
  display:inline-block;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<div class="chat">
  <input id="input" placeholder="Type..." />
  <button onclick="nextStep()">Send</button>
</div>

<!-- 🔐 ADMIN BUTTON (hidden trigger) -->
<div style="position:fixed;bottom:10px;left:10px;opacity:0.1">
  <button onclick="openAdmin()">.</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <h2>📊 ADMIN DASHBOARD</h2>

  <div class="smallBtn" onclick="exportData()">📤 Export Emails</div>
  <div class="smallBtn" onclick="clearData()">🗑 Clear</div>
  <div class="smallBtn" onclick="closeAdmin()">❌ Close</div>

  <div id="dataBox"></div>

</div>

<script>

/* ======================
   LANGUAGE
====================== */
let lang = navigator.language.startsWith("es") ? "es"
         : navigator.language.startsWith("it") ? "it"
         : "en";

const t = {
  es:{
    hello:"👋 Soy tu asistente financiero",
    ask:"¿Quieres invertir y proteger tu dinero?",
    email:"Déjame tu email",
    thanks:"Perfecto, ahora te contacto",
    btn:"Ir a WhatsApp"
  },
  it:{
    hello:"👋 Sono il tuo assistente finanziario",
    ask:"Vuoi investire e proteggere il tuo denaro?",
    email:"Lascia la tua email",
    thanks:"Perfetto, ti contatto ora",
    btn:"Vai su WhatsApp"
  },
  en:{
    hello:"👋 I'm your financial assistant",
    ask:"Do you want to invest and protect your money?",
    email:"Leave your email",
    thanks:"Perfect, I will contact you",
    btn:"Go to WhatsApp"
  }
}[lang];

/* ======================
   CHAT
====================== */
let step=0;
let email="";
let interest="";

function bot(msg){
  let d=document.createElement("div");
  d.className="bubble bot";
  d.innerText=msg;
  document.getElementById("chat").appendChild(d);
}

function user(msg){
  let d=document.createElement("div");
  d.className="bubble user";
  d.innerText=msg;
  document.getElementById("chat").appendChild(d);
  document.getElementById("chat").appendChild(document.createElement("div")).className="clear";
}

/* INIT */
bot(t.hello);
setTimeout(()=>bot(t.ask),800);

/* ======================
   FLOW
====================== */
function nextStep(){

  let val=document.getElementById("input").value;
  if(!val)return;

  user(val);
  document.getElementById("input").value="";

  if(step==0){
    interest=val;
    setTimeout(()=>bot(t.email),800);
    step++;
    return;
  }

  if(step==1){
    email=val;

    let leads=JSON.parse(localStorage.getItem("leads")||"[]");
    leads.push({email,interest,date:new Date().toISOString()});
    localStorage.setItem("leads",JSON.stringify(leads));

    setTimeout(()=>bot(t.thanks),800);

    setTimeout(()=>{
      let a=document.createElement("a");
      a.href="https://wa.me/393514697366?text=Hi%20I%20want%20to%20start%20the%20system";
      a.innerText=t.btn;
      a.className="bubble bot";
      a.target="_blank";
      document.getElementById("chat").appendChild(a);
    },1500);

    step++;
  }
}

/* ======================
   ADMIN ACCESS
====================== */
function openAdmin(){

  let pass=prompt("Enter admin key:");

  // 🔐 TU CLAVE AQUÍ
  const KEY="181818a/";

  if(pass!==KEY){
    alert("Denied");
    return;
  }

  document.getElementById("adminPanel").style.display="block";
  loadData();
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display="none";
}

function loadData(){
  let data=JSON.parse(localStorage.getItem("leads")||"[]");

  let html="";

  data.forEach((d,i)=>{
    html+=`
    <div class="box">
      <b>#${i+1}</b><br>
      📧 ${d.email}<br>
      💡 ${d.interest}<br>
      🕒 ${d.date}
    </div>`;
  });

  document.getElementById("dataBox").innerHTML=html||"No data";
}

/* ======================
   EXPORT / CLEAR
====================== */
function exportData(){
  let data=localStorage.getItem("leads");
  let blob=new Blob([data],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="leads.json";
  a.click();
}

function clearData(){
  if(confirm("Delete all?")){
    localStorage.removeItem("leads");
    loadData();
  }
}

</script>

</body>
</html>
