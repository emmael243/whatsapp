<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MyOW - Llamadas WebRTC con TURN</title>
    <style>
        /* (Mismo CSS que antes, sin cambios por brevedad) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f1c;
            color: #eef4ff;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: #111827;
            border-radius: 28px;
            padding: 18px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .logo h1 {
            font-size: 1.7rem;
            background: linear-gradient(135deg, #60a5fa, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .user-area {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #1f2937;
            padding: 8px 16px;
            border-radius: 60px;
        }
        .user-area input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            width: 180px;
        }
        .user-area button {
            background: #3b82f6;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .status-badge {
            background: #10b98120;
            border-left: 4px solid #10b981;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }
        .devices-panel {
            flex: 1.2;
            min-width: 260px;
            background: #111827;
            border-radius: 28px;
            padding: 20px;
        }
        .video-panel {
            flex: 2;
            min-width: 320px;
            background: #111827;
            border-radius: 28px;
            padding: 20px;
        }
        .panel-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 16px;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }
        .device-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
        }
        .device-item {
            background: #1e293b;
            margin: 12px 0;
            padding: 14px 16px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .device-phone {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .call-btn {
            background: #10b981;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .call-btn:hover {
            background: #059669;
        }
        .video-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
        }
        .video-box {
            background: #00000066;
            border-radius: 24px;
            overflow: hidden;
            text-align: center;
            flex: 1;
            min-width: 250px;
        }
        .video-box video {
            width: 100%;
            background: #0a0a0a;
            border-radius: 20px;
            transform: scaleX(-1);
            max-height: 280px;
            object-fit: cover;
        }
        .call-controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #ef4444;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        .action-btn.warning {
            background: #eab308;
            color: black;
        }
        .incoming-card {
            background: #f97316dd;
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 760px) {
            .header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1>📞 MyOW Call + TURN</h1></div>
        <div class="user-area">
            <input type="tel" id="phoneInput" placeholder="+34 600 000 000" autocomplete="off">
            <button id="setPhoneBtn">✅ Registrar número</button>
        </div>
        <div class="status-badge" id="connectionStatus">⚪ Desconectado</div>
    </div>
    <div class="dashboard">
        <div class="devices-panel">
            <div class="panel-title">📱 Dispositivos activos</div>
            <ul id="deviceList" class="device-list">
                <li style="opacity:0.6">🔍 Esperando dispositivos...</li>
            </ul>
        </div>
        <div class="video-panel">
            <div class="panel-title">🎥 Sala de llamada</div>
            <div id="incomingNotification" class="hidden"></div>
            <div class="video-container">
                <div class="video-box">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">📹 Tú</div>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label">👤 Remoto</div>
                </div>
            </div>
            <div class="call-controls">
                <button id="hangupBtn" class="action-btn" style="background:#dc2626;" disabled>📴 Colgar</button>
                <button id="toggleMicBtn" class="action-btn warning" style="background:#475569;">🎤 Micrófono ON</button>
                <button id="toggleCamBtn" class="action-btn warning" style="background:#475569;">📷 Cámara ON</button>
            </div>
            <div id="callStatusMsg" style="text-align:center; margin-top:12px; font-size:0.8rem; color:#cbd5e1;"></div>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.2/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, set, onValue, push, remove, onDisconnect, update, get } from "firebase/database";

    // ---------- CONFIGURACIÓN FIREBASE ----------
    const firebaseConfig = {
        apiKey: "AIzaSyD29ExpZwaXQGV059fQGZ-3i0GMzk353o0",
        authDomain: "myow-cdb46.firebaseapp.com",
        databaseURL: "https://myow-cdb46-default-rtdb.firebaseio.com",
        projectId: "myow-cdb46",
        storageBucket: "myow-cdb46.firebasestorage.app",
        messagingSenderId: "651159312592",
        appId: "1:651159312592:web:98404f13e075fdce4d26d5",
        measurementId: "G-W53ZFMPW7X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ========== 🔧 CONFIGURACIÓN DE TURN (¡REEMPLAZA CON TUS DATOS!) ==========
    const turnConfig = {
        urls: "turn:tu-turn-server.metered.live:3478?transport=udp",   // Ejemplo: turn:xxxx.metered.live:3478
        username: "tu_usuario_turn",
        credential: "tu_contraseña_turn"
    };
    // Si tienes múltiples servidores TURN, puedes agregar más objetos al arreglo.
    // =========================================================================

    // Servidores ICE (STUN + TURN)
    const iceServers = [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        turnConfig  // Agrega tu TURN configurado arriba
    ];

    // ---------- VARIABLES GLOBALES ----------
    let myClientId = null;
    let myPhoneNumber = "";
    let peerConnection = null;
    let localStream = null;
    let activeCallId = null;
    let currentCallPeerId = null;
    let isCaller = false;
    let candidateQueue = [];
    let remoteDescSet = false;
    let answerListenerRef = null;
    let callerCandidateListenerRef = null;
    let calleeCandidateListenerRef = null;
    let callNodeListenerRef = null;

    // DOM elements
    const phoneInput = document.getElementById('phoneInput');
    const setPhoneBtn = document.getElementById('setPhoneBtn');
    const deviceListUl = document.getElementById('deviceList');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const hangupBtn = document.getElementById('hangupBtn');
    const toggleMicBtn = document.getElementById('toggleMicBtn');
    const toggleCamBtn = document.getElementById('toggleCamBtn');
    const connectionStatusSpan = document.getElementById('connectionStatus');
    const incomingDiv = document.getElementById('incomingNotification');
    const callStatusSpan = document.getElementById('callStatusMsg');

    let micEnabled = true;
    let camEnabled = true;

    function generateUUID() {
        return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    }

    async function updatePresence() {
        if (!myClientId || !myPhoneNumber) return;
        const presenceRef = ref(db, `presence/${myClientId}`);
        await set(presenceRef, {
            phoneNumber: myPhoneNumber,
            clientId: myClientId,
            timestamp: Date.now(),
            online: true
        });
        onDisconnect(presenceRef).remove();
        connectionStatusSpan.innerHTML = `✅ Conectado como ${myPhoneNumber}`;
    }

    function listenDevices() {
        const presenceRef = ref(db, 'presence');
        onValue(presenceRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                deviceListUl.innerHTML = '<li>📡 No hay dispositivos conectados</li>';
                return;
            }
            const devices = [];
            for (let [id, info] of Object.entries(data)) {
                if (id === myClientId) continue;
                devices.push({ clientId: id, phoneNumber: info.phoneNumber || "???" });
            }
            if (devices.length === 0) {
                deviceListUl.innerHTML = '<li>👤 No hay otros dispositivos en línea</li>';
                return;
            }
            deviceListUl.innerHTML = "";
            devices.forEach(dev => {
                const li = document.createElement('li');
                li.className = 'device-item';
                li.innerHTML = `
                    <div class="device-info">
                        <span class="device-phone">📞 ${dev.phoneNumber}</span>
                        <span class="device-id">🆔 ${dev.clientId.slice(0,8)}...</span>
                    </div>
                    <button class="call-btn" data-clientid="${dev.clientId}" data-phone="${dev.phoneNumber}">🔊 Llamar</button>
                `;
                deviceListUl.appendChild(li);
            });
            document.querySelectorAll('.call-btn').forEach(btn => {
                btn.removeEventListener('click', handleCallClick);
                btn.addEventListener('click', handleCallClick);
            });
        });
    }

    async function handleCallClick(e) {
        const btn = e.currentTarget;
        const calleeId = btn.getAttribute('data-clientid');
        const calleePhone = btn.getAttribute('data-phone');
        if (!myPhoneNumber) {
            alert("Primero registra tu número de teléfono");
            return;
        }
        if (activeCallId) {
            alert("Ya hay una llamada activa. Cuelga antes de llamar.");
            return;
        }
        await initiateCall(calleeId, calleePhone);
    }

    // ---- WebRTC con TURN integrado ----
    function createPeerConnection() {
        if (peerConnection) peerConnection.close();
        const configuration = { iceServers };
        peerConnection = new RTCPeerConnection(configuration);
        remoteDescSet = false;
        candidateQueue = [];

        peerConnection.onicecandidate = (event) => {
            if (event.candidate && activeCallId) {
                const candidate = event.candidate;
                const candidateRef = ref(db, `calls/${activeCallId}/${isCaller ? 'callerCandidates' : 'calleeCandidates'}/${Date.now()}_${Math.random()}`);
                set(candidateRef, candidate);
            }
        };

        peerConnection.ontrack = (event) => {
            if (event.streams && event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
            } else {
                if (remoteVideo.srcObject) {
                    remoteVideo.srcObject.addTrack(event.track);
                } else {
                    const newStream = new MediaStream();
                    newStream.addTrack(event.track);
                    remoteVideo.srcObject = newStream;
                }
            }
        };

        peerConnection.onconnectionstatechange = () => {
            if (peerConnection && (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed')) {
                endCall();
                callStatusSpan.innerText = "🔌 Llamada perdida";
            }
        };
        return peerConnection;
    }

    async function initiateCall(calleeId, calleePhone) {
        try {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                updateMediaButtons();
            }
            createPeerConnection();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            const callId = push(ref(db, 'calls')).key;
            activeCallId = callId;
            currentCallPeerId = calleeId;
            isCaller = true;

            const callRef = ref(db, `calls/${callId}`);
            await set(callRef, {
                callerId: myClientId,
                calleeId: calleeId,
                callerPhone: myPhoneNumber,
                calleePhone: calleePhone,
                offer: { sdp: offer.sdp, type: offer.type },
                status: "calling",
                createdAt: Date.now()
            });

            callStatusSpan.innerText = `📞 Llamando a ${calleePhone}...`;
            hangupBtn.disabled = false;

            // Escuchar respuesta
            answerListenerRef = onValue(ref(db, `calls/${callId}/answer`), async (snap) => {
                const answer = snap.val();
                if (answer && peerConnection && peerConnection.remoteDescription === null) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    remoteDescSet = true;
                    while (candidateQueue.length) {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(candidateQueue.shift()));
                    }
                    callStatusSpan.innerText = `🔊 En llamada con ${calleePhone}`;
                }
            });

            callerCandidateListenerRef = onValue(ref(db, `calls/${callId}/calleeCandidates`), (snap) => {
                const candidates = snap.val();
                if (candidates && peerConnection) {
                    Object.values(candidates).forEach(async (cand) => {
                        try {
                            if (remoteDescSet) {
                                await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                            } else {
                                candidateQueue.push(cand);
                            }
                        } catch(e) { console.warn("ICE error", e); }
                    });
                }
            });

            callNodeListenerRef = onValue(ref(db, `calls/${callId}`), (snap) => {
                if (!snap.exists() && activeCallId === callId) endCall();
            });

        } catch (err) {
            console.error("Error initiateCall", err);
            alert("Error al iniciar llamada: " + err.message);
            resetCallUI();
        }
    }

    function listenIncomingCalls() {
        if (!myClientId) return;
        const callsRef = ref(db, 'calls');
        onValue(callsRef, (snapshot) => {
            const calls = snapshot.val();
            if (!calls) return;
            for (let [callId, callData] of Object.entries(calls)) {
                if (callData.calleeId === myClientId && callData.status === "calling" && !activeCallId) {
                    showIncomingCall(callId, callData);
                    break;
                }
            }
        });
    }

    let currentIncomingCallId = null;
    function showIncomingCall(callId, callData) {
        if (activeCallId) return;
        currentIncomingCallId = callId;
        incomingDiv.classList.remove('hidden');
        incomingDiv.innerHTML = `
            <div class="incoming-card">
                <span>📞 Llamada entrante de ${callData.callerPhone || "desconocido"}</span>
                <button id="acceptCallBtn" style="background:#22c55e; border:none; padding:6px 20px; border-radius:40px;">Aceptar</button>
                <button id="rejectCallBtn" style="background:#ef4444; border:none; padding:6px 18px; border-radius:40px;">Rechazar</button>
            </div>
        `;
        document.getElementById('acceptCallBtn')?.addEventListener('click', async () => {
            await acceptCall(callId, callData);
            incomingDiv.classList.add('hidden');
        });
        document.getElementById('rejectCallBtn')?.addEventListener('click', async () => {
            await rejectCall(callId);
            incomingDiv.classList.add('hidden');
        });
    }

    async function acceptCall(callId, callData) {
        if (activeCallId) return;
        try {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                updateMediaButtons();
            }
            createPeerConnection();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            const callRef = ref(db, `calls/${callId}`);
            const offerSnap = await get(ref(db, `calls/${callId}/offer`));
            const offer = offerSnap.val();
            if (!offer) throw new Error("Oferta no encontrada");

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            remoteDescSet = true;
            while (candidateQueue.length) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidateQueue.shift()));
            }

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await update(callRef, { answer: { sdp: answer.sdp, type: answer.type }, status: "accepted" });

            activeCallId = callId;
            currentCallPeerId = callData.callerId;
            isCaller = false;
            hangupBtn.disabled = false;
            callStatusSpan.innerText = `📞 En llamada con ${callData.callerPhone}`;

            calleeCandidateListenerRef = onValue(ref(db, `calls/${callId}/callerCandidates`), (snap) => {
                const candidates = snap.val();
                if (candidates && peerConnection) {
                    Object.values(candidates).forEach(async (cand) => {
                        if (remoteDescSet) {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                        } else {
                            candidateQueue.push(cand);
                        }
                    });
                }
            });

            callNodeListenerRef = onValue(ref(db, `calls/${callId}`), (snap) => {
                if (!snap.exists() && activeCallId === callId) endCall();
            });

        } catch (err) {
            console.error("Error acceptCall", err);
            alert("No se pudo aceptar la llamada");
            resetCallUI();
        }
    }

    async function rejectCall(callId) {
        await remove(ref(db, `calls/${callId}`));
    }

    async function endCall() {
        if (activeCallId) {
            try {
                await remove(ref(db, `calls/${activeCallId}`));
            } catch(e) {}
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (answerListenerRef) answerListenerRef();
            if (callerCandidateListenerRef) callerCandidateListenerRef();
            if (calleeCandidateListenerRef) calleeCandidateListenerRef();
            if (callNodeListenerRef) callNodeListenerRef();
            answerListenerRef = callerCandidateListenerRef = calleeCandidateListenerRef = callNodeListenerRef = null;
            activeCallId = null;
            remoteVideo.srcObject = null;
            callStatusSpan.innerText = "";
            hangupBtn.disabled = true;
            remoteDescSet = false;
            candidateQueue = [];
            isCaller = false;
        }
    }

    function resetCallUI() {
        if (activeCallId) endCall();
        else {
            if (peerConnection) peerConnection.close();
            peerConnection = null;
            remoteVideo.srcObject = null;
            hangupBtn.disabled = true;
        }
    }

    function updateMediaButtons() {
        if (!localStream) return;
        const audioTracks = localStream.getAudioTracks();
        const videoTracks = localStream.getVideoTracks();
        if (audioTracks.length) {
            micEnabled = audioTracks[0].enabled;
            toggleMicBtn.innerHTML = micEnabled ? "🎤 Micrófono ON" : "🎤 Micrófono OFF";
        }
        if (videoTracks.length) {
            camEnabled = videoTracks[0].enabled;
            toggleCamBtn.innerHTML = camEnabled ? "📷 Cámara ON" : "📷 Cámara OFF";
        }
    }

    toggleMicBtn.addEventListener('click', () => {
        if (localStream) {
            const audioTracks = localStream.getAudioTracks();
            if (audioTracks.length) {
                audioTracks[0].enabled = !audioTracks[0].enabled;
                micEnabled = audioTracks[0].enabled;
                toggleMicBtn.innerHTML = micEnabled ? "🎤 Micrófono ON" : "🎤 Micrófono OFF";
            }
        }
    });

    toggleCamBtn.addEventListener('click', () => {
        if (localStream) {
            const videoTracks = localStream.getVideoTracks();
            if (videoTracks.length) {
                videoTracks[0].enabled = !videoTracks[0].enabled;
                camEnabled = videoTracks[0].enabled;
                toggleCamBtn.innerHTML = camEnabled ? "📷 Cámara ON" : "📷 Cámara OFF";
            }
        }
    });

    hangupBtn.addEventListener('click', () => {
        endCall();
        callStatusSpan.innerText = "Llamada finalizada";
    });

    setPhoneBtn.addEventListener('click', async () => {
        let phone = phoneInput.value.trim();
        if (!phone) {
            alert("Ingresa un número de teléfono");
            return;
        }
        myPhoneNumber = phone;
        if (!myClientId) {
            myClientId = generateUUID();
            sessionStorage.setItem("myow_client_id", myClientId);
        }
        await updatePresence();
        listenIncomingCalls();
        listenDevices();
    });

    // Inicialización
    const storedId = sessionStorage.getItem("myow_client_id");
    if (storedId) {
        myClientId = storedId;
    } else {
        myClientId = generateUUID();
        sessionStorage.setItem("myow_client_id", myClientId);
    }
    connectionStatusSpan.innerHTML = "⚡ Esperando número...";

    window.addEventListener('beforeunload', () => {
        if (myClientId) remove(ref(db, `presence/${myClientId}`));
        if (peerConnection) peerConnection.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
    });
</script>
</body>
</html>
