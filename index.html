<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Assistant</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #0b1220;
  color: white;
}

.chat {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.bubble {
  padding: 12px 14px;
  margin: 10px 0;
  border-radius: 14px;
  display: inline-block;
  max-width: 85%;
  animation: fade 0.4s ease;
}

.bot {
  background: rgba(255,255,255,0.08);
}

.user {
  background: #2563eb;
  float: right;
}

.clear { clear: both; }

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.hidden { display:none; }

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="chat">

  <input id="input" placeholder="Type here..." />
  <button onclick="nextStep()">Send</button>

</div>

<script>

/* =========================
   LANGUAGE DETECTION
========================= */
let lang = navigator.language.startsWith("es") ? "es"
         : navigator.language.startsWith("it") ? "it"
         : "en";

/* =========================
   CHAT STATE
========================= */
let step = 0;
let email = "";
let interest = "";

/* =========================
   TEXTS
========================= */
const t = {
  es:{
    hello:"👋 Hola, soy tu asistente financiero",
    ask:"¿Quieres aprender a invertir y proteger tu dinero?",
    email:"Perfecto. Déjame tu email para enviarte la guía",
    thanks:"Perfecto. Ahora te conecto con un asesor",
    btn:"Continuar en WhatsApp"
  },
  it:{
    hello:"👋 Ciao, sono il tuo assistente finanziario",
    ask:"Vuoi imparare a investire e proteggere il tuo denaro?",
    email:"Perfetto. Lascia la tua email",
    thanks:"Perfetto. Ora ti collego con un consulente",
    btn:"Continua su WhatsApp"
  },
  en:{
    hello:"👋 Hi, I'm your financial assistant",
    ask:"Do you want to learn how to invest and protect your money?",
    email:"Great. Leave your email to get the guide",
    thanks:"Perfect. Now I connect you with an advisor",
    btn:"Continue on WhatsApp"
  }
}[lang];

/* =========================
   CHAT RENDER
========================= */
function bot(msg){
  const div = document.createElement("div");
  div.className = "bubble bot";
  div.innerText = msg;
  document.getElementById("chat").appendChild(div);
}

function user(msg){
  const div = document.createElement("div");
  div.className = "bubble user";
  div.innerText = msg;
  document.getElementById("chat").appendChild(div);

  const clear = document.createElement("div");
  clear.className = "clear";
  document.getElementById("chat").appendChild(clear);
}

/* =========================
   INIT CHAT
========================= */
bot(t.hello);
setTimeout(()=>bot(t.ask), 800);

/* =========================
   FLOW
========================= */
function nextStep(){

  const input = document.getElementById("input").value;
  if(!input) return;

  user(input);
  document.getElementById("input").value = "";

  if(step === 0){
    interest = input;
    setTimeout(()=>bot(t.email), 800);
    step++;
    return;
  }

  if(step === 1){
    email = input;

    // save locally
    let data = JSON.parse(localStorage.getItem("leads") || "[]");
    data.push({email, interest});
    localStorage.setItem("leads", JSON.stringify(data));

    setTimeout(()=>bot(t.thanks), 800);

    setTimeout(()=>{
      const wa = document.createElement("a");
      wa.href = "https://wa.me/393514697366?text=Hi%20I%20want%20to%20start%20the%20investment%20system";
      wa.innerText = t.btn;
      wa.className = "bubble bot";
      wa.target = "_blank";
      document.getElementById("chat").appendChild(wa);
    }, 1500);

    step++;
  }
}

</script>

</body>
</html>
