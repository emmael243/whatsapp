<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>WebRTC Básico - Oferta/Respuesta</title>
<style>
body { font-family: sans-serif; background:#111; color:#eee; padding:20px; }
video { width: 45%; margin:10px; border-radius:12px; background:#000; }
textarea { width:100%; height:60px; margin:4px 0; }
button { padding:8px 16px; margin:4px; }
</style>
</head>
<body>
<h2>WebRTC Básico - Oferta/Respuesta</h2>

<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>

<div>
  <button id="startBtn">🎬 Iniciar cámara</button>
  <button id="callBtn">📞 Crear Oferta</button>
  <button id="answerBtn">✅ Crear Respuesta</button>
</div>

<h3>Oferta (JSON)</h3>
<textarea id="offerArea"></textarea>

<h3>Respuesta (JSON)</h3>
<textarea id="answerArea"></textarea>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-database.js";

// ---- CONFIG FIREBASE ----
const firebaseConfig = {
  apiKey: "AIzaSyD29ExpZwaXQGV059fQGZ-3i0GMzk353o0",
  authDomain: "myow-cdb46.firebaseapp.com",
  databaseURL: "https://myow-cdb46-default-rtdb.firebaseio.com",
  projectId: "myow-cdb46",
  storageBucket: "myow-cdb46.appspot.com",
  messagingSenderId: "651159312592",
  appId: "1:651159312592:web:98404f13e075fdce4d26d5"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ---- VARIABLES ----
let localStream;
let pc;
const iceServers = [{ urls: "stun:stun.l.google.com:19302" }];
const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");
const offerArea = document.getElementById("offerArea");
const answerArea = document.getElementById("answerArea");

// ---- FUNCIONES ----
async function startCamera() {
    localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
    localVideo.srcObject = localStream;
    console.log("🎥 Cámara iniciada");
}

function createPeerConnection() {
    pc = new RTCPeerConnection({ iceServers });
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    pc.ontrack = e => { remoteVideo.srcObject = e.streams[0]; console.log("📡 Track remoto recibido"); };
    pc.onicecandidate = e => {
        if(e.candidate) console.log("🔹 ICE candidate", e.candidate);
    };
}

// ---- BOTONES ----
document.getElementById("startBtn").onclick = startCamera;

document.getElementById("callBtn").onclick = async () => {
    createPeerConnection();
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    offerArea.value = JSON.stringify(offer);
    console.log("📢 Oferta creada");
};

document.getElementById("answerBtn").onclick = async () => {
    createPeerConnection();
    const offer = JSON.parse(offerArea.value);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    answerArea.value = JSON.stringify(answer);
    console.log("✅ Respuesta creada");
    // Aplicar la respuesta manualmente en el otro lado
};
</script>
</body>
</html>
