<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MyOW - WebRTC Simple</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f1c;
            color: #eef4ff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: #111827;
            border-radius: 28px;
            padding: 18px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .logo h1 { font-size: 1.7rem; background: linear-gradient(135deg, #60a5fa, #a855f7); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .user-area {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #1f2937;
            padding: 8px 16px;
            border-radius: 60px;
        }
        .user-area input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            width: 180px;
        }
        .user-area button {
            background: #3b82f6;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .status-badge {
            background: #10b98120;
            border-left: 4px solid #10b981;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .dashboard { display: flex; flex-wrap: wrap; gap: 24px; }
        .devices-panel {
            flex: 1.2;
            min-width: 260px;
            background: #111827;
            border-radius: 28px;
            padding: 20px;
        }
        .video-panel {
            flex: 2;
            min-width: 320px;
            background: #111827;
            border-radius: 28px;
            padding: 20px;
        }
        .panel-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 16px;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }
        .device-list { list-style: none; max-height: 500px; overflow-y: auto; }
        .device-item {
            background: #1e293b;
            margin: 12px 0;
            padding: 14px 16px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .device-phone { font-weight: bold; font-size: 1.1rem; }
        .call-btn {
            background: #10b981;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .video-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; }
        .video-box {
            background: #00000066;
            border-radius: 24px;
            overflow: hidden;
            text-align: center;
            flex: 1;
            min-width: 250px;
        }
        .video-box video {
            width: 100%;
            background: #0a0a0a;
            border-radius: 20px;
            transform: scaleX(-1);
            max-height: 280px;
            object-fit: cover;
        }
        .video-label { background: rgba(0,0,0,0.7); padding: 5px; font-size: 0.8rem; }
        .call-controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #ef4444;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        .action-btn.warning { background: #eab308; color: black; }
        .incoming-card {
            background: #f97316dd;
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }
        .hidden { display: none; }
        .debug-panel {
            margin-top: 12px;
            background: #1e1e2f;
            padding: 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
        }
        button.small {
            background: #3b82f6;
            padding: 5px 12px;
            font-size: 0.7rem;
            margin-top: 8px;
        }
        @media (max-width: 760px) { .header { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1>📞 MyOW Call (STUN + TURN)</h1></div>
        <div class="user-area">
            <input type="tel" id="phoneInput" placeholder="+34 600 000 000" autocomplete="off">
            <button id="setPhoneBtn">✅ Registrar número</button>
        </div>
        <div class="status-badge" id="connectionStatus">⚪ Desconectado</div>
    </div>
    <div class="dashboard">
        <div class="devices-panel">
            <div class="panel-title">📱 Dispositivos activos</div>
            <ul id="deviceList" class="device-list">
                <li style="opacity:0.6">🔍 Esperando dispositivos...</li>
            </ul>
        </div>
        <div class="video-panel">
            <div class="panel-title">🎥 Sala de llamada</div>
            <div id="incomingNotification" class="hidden"></div>
            <div class="video-container">
                <div class="video-box">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">📹 Tú</div>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label">👤 Remoto</div>
                </div>
            </div>
            <div class="call-controls">
                <button id="hangupBtn" class="action-btn" style="background:#dc2626;" disabled>📴 Colgar</button>
                <button id="toggleMicBtn" class="action-btn warning" style="background:#475569;">🎤 Micrófono ON</button>
                <button id="toggleCamBtn" class="action-btn warning" style="background:#475569;">📷 Cámara ON</button>
                <button id="playRemoteBtn" class="action-btn small" style="background:#3b82f6; display: none;">🔊 Reproducir remoto</button>
            </div>
            <div id="callStatusMsg" style="text-align:center; margin-top:12px; font-size:0.8rem; color:#cbd5e1;"></div>
            <div class="debug-panel" id="debugLog"></div>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.2/firebase-database.js"
        }
    }
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getDatabase, ref, set, onValue, push, remove, onDisconnect, update } from "firebase/database";

// ==================== FIREBASE ====================
const firebaseConfig = {
    apiKey: "AIzaSyD29ExpZwaXQGV059fQGZ-3i0GMzk353o0",
    authDomain: "myow-cdb46.firebaseapp.com",
    databaseURL: "https://myow-cdb46-default-rtdb.firebaseio.com",
    projectId: "myow-cdb46",
    storageBucket: "myow-cdb46.firebasestorage.app",
    messagingSenderId: "651159312592",
    appId: "1:651159312592:web:98404f13e075fdce4d26d5",
    measurementId: "G-W53ZFMPW7X"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ==================== ICE SERVERS ====================
const turnConfig = {
    urls: [
        "turn:global.turn.metered.live:3478?transport=udp",
        "turn:global.turn.metered.live:3478?transport=tcp",
        "turn:global.turn.metered.live:443?transport=tcp"
    ],
    username: "6add749aa39bded58851f0d5",
    credential: "TF2Z0iD5X45aIWpX"
};
const iceServers = [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
    turnConfig
];

// ==================== VARIABLES GLOBALES ====================
let myClientId = null;
let myPhoneNumber = "";
let peerConnection = null;
let localStream = null;
let activeCallId = null;
let isCaller = false;
let candidateQueue = [];
let remoteDescSet = false;
let answerListenerRef = null;
let callerCandidateListenerRef = null;
let calleeCandidateListenerRef = null;
let callNodeListenerRef = null;

// DOM
const phoneInput = document.getElementById('phoneInput');
const setPhoneBtn = document.getElementById('setPhoneBtn');
const deviceListUl = document.getElementById('deviceList');
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const hangupBtn = document.getElementById('hangupBtn');
const toggleMicBtn = document.getElementById('toggleMicBtn');
const toggleCamBtn = document.getElementById('toggleCamBtn');
const connectionStatusSpan = document.getElementById('connectionStatus');
const incomingDiv = document.getElementById('incomingNotification');
const callStatusSpan = document.getElementById('callStatusMsg');
const debugLog = document.getElementById('debugLog');
const playRemoteBtn = document.getElementById('playRemoteBtn');

// Forzar autoplay
remoteVideo.autoplay = true;
remoteVideo.playsInline = true;
remoteVideo.controls = true;
remoteVideo.volume = 1;

function log(msg){
    const time = new Date().toLocaleTimeString();
    debugLog.innerHTML += `<div>${time}: ${msg}</div>`;
    debugLog.scrollTop = debugLog.scrollHeight;
    console.log(msg);
}

function generateUUID() { return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

function forcePlayWithRetry() {
    let attempts = 0;
    const tryPlay = () => {
        attempts++;
        remoteVideo.play()
            .then(() => log(`▶️ PLAY OK intento ${attempts}`))
            .catch(e => {
                log(`❌ autoplay intento ${attempts}`);
                if (attempts < 10) setTimeout(tryPlay, 300);
                else playRemoteBtn.style.display = 'inline-block';
            });
    };
    tryPlay();
}

// ... resto del código: getLocalStream, createPeerConnection, initiateCall, listenIncomingCalls, acceptCall, rejectCall, endCall, resetCallUI, updateMediaButtons, eventos de botones ...

// ==================== Eventos botones ====================
toggleMicBtn.addEventListener('click', () => {
    if (localStream) {
        const audioTracks = localStream.getAudioTracks();
        if (audioTracks.length) {
            audioTracks[0].enabled = !audioTracks[0].enabled;
            toggleMicBtn.innerHTML = audioTracks[0].enabled ? "🎤 Micrófono ON" : "🎤 Micrófono OFF";
            log(`Micrófono ${audioTracks[0].enabled ? 'activado' : 'silenciado'}`);
        }
    }
});
toggleCamBtn.addEventListener('click', () => {
    if (localStream) {
        const videoTracks = localStream.getVideoTracks();
        if (videoTracks.length) {
            videoTracks[0].enabled = !videoTracks[0].enabled;
            toggleCamBtn.innerHTML = videoTracks[0].enabled ? "📷 Cámara ON" : "📷 Cámara OFF";
            log(`Cámara ${videoTracks[0].enabled ? 'activada' : 'apagada'}`);
        }
    }
});
hangupBtn.addEventListener('click', () => { endCall(); callStatusSpan.innerText = "Llamada finalizada"; });
playRemoteBtn.addEventListener('click', () => {
    if (remoteVideo.srcObject) remoteVideo.play().then(()=>log("▶️ Reproducción manual iniciada")).catch(e=>log(`❌ Error play manual: ${e.message}`));
});

// Registro de número
setPhoneBtn.addEventListener('click', async () => {
    let phone = phoneInput.value.trim();
    if (!phone) return alert("Ingresa un número");
    myPhoneNumber = phone;
    if (!myClientId) {
        myClientId = generateUUID();
        sessionStorage.setItem("myow_client_id", myClientId);
    }
    await updatePresence();
    listenIncomingCalls();
    listenDevices();
    log(`🎉 Registrado con número: ${myPhoneNumber}`);
});

// Inicialización
const storedId = sessionStorage.getItem("myow_client_id");
if(storedId){ myClientId = storedId; log(`Cliente ID recuperado: ${myClientId}`); }
else { myClientId = generateUUID(); sessionStorage.setItem("myow_client_id", myClientId); log(`Nuevo cliente ID: ${myClientId}`); }
connectionStatusSpan.innerHTML = "⚡ Esperando número...";
log("🚀 App inicializada, esperando registro");

// Forzar play con clic
document.body.addEventListener('click', () => { if(remoteVideo.srcObject) remoteVideo.play().catch(()=>{}); });
window.addEventListener('beforeunload', () => { if(myClientId) remove(ref(db, `presence/${myClientId}`)); if(peerConnection) peerConnection.close(); if(localStream) localStream.getTracks().forEach(t=>t.stop()); });
</script>
</body>
</html>
