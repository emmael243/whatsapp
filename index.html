<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebRTC FIX FINAL</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
video { width:300px; background:black; border-radius:10px; margin:5px;}
button { padding:10px; margin:5px; }
#debug { background:#111; padding:10px; margin-top:10px; max-height:200px; overflow:auto; font-size:12px;}
</style>
</head>

<body>

<h2>📞 WebRTC FIX</h2>

<input id="phone" placeholder="Tu número">
<button onclick="register()">Registrar</button>

<h3>Usuarios</h3>
<div id="users"></div>

<h3>Video</h3>
<video id="localVideo" autoplay muted playsinline></video>
<video id="remoteVideo" playsinline controls></video>

<br>
<button onclick="forcePlay()">▶️ Forzar audio</button>
<button onclick="hangup()">Colgar</button>

<div id="debug"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-database.js";

// 🔥 FIREBASE
const firebaseConfig = {
    databaseURL: "https://myow-cdb46-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 ICE
const iceServers = [
    { urls: "stun:stun.l.google.com:19302" },
    {
        urls: "turn:global.turn.metered.live:3478",
        username: "6add749aa39bded58851f0d5",
        credential: "TF2Z0iD5X45aIWpX"
    }
];

// 🔥 VARIABLES
let pc, localStream, callId, isCaller=false;
let myId = Math.random().toString(36).substr(2,9);
let myPhone="";

// DOM
const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");
const debug = document.getElementById("debug");

// 🔥 CONFIG VIDEO REMOTO (CLAVE)
remoteVideo.autoplay = true;
remoteVideo.playsInline = true;
remoteVideo.controls = true;

// 🔥 LOG
function log(msg){
    console.log(msg);
    debug.innerHTML += "<div>"+msg+"</div>";
    debug.scrollTop = debug.scrollHeight;
}

// 🔥 MEDIA
async function getMedia(){
    localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    localVideo.srcObject = localStream;

    log("🎥 Tracks locales:");
    localStream.getTracks().forEach(t=>log("➡️ "+t.kind));
}

// 🔥 PEER CONNECTION
function createPC(){

    pc = new RTCPeerConnection({iceServers});

    pc.onicecandidate = e=>{
        if(e.candidate){
            const path = isCaller ? "caller" : "callee";
            set(ref(db,"calls/"+callId+"/"+path+"/"+Date.now()), e.candidate);
            log("📡 ICE: "+e.candidate.type);
        }
    };

    pc.onconnectionstatechange = ()=>{
        log("🔌 "+pc.connectionState);
    };

    pc.oniceconnectionstatechange = ()=>{
        log("🧊 "+pc.iceConnectionState);
    };

    // 🔥 FIX PRINCIPAL
    pc.ontrack = (event)=>{
        log("📺 TRACK: "+event.track.kind);

        // 👇 SOLO UNA VEZ
        if(!remoteVideo.srcObject){
            remoteVideo.srcObject = event.streams[0];
            log("🎬 Stream remoto asignado UNA sola vez");

            setTimeout(()=>{
                remoteVideo.play()
                .then(()=>log("▶️ PLAY OK"))
                .catch(e=>log("❌ autoplay "+e.message));
            },200);
        }
    };
}

// 🔥 REGISTRO
window.register = async ()=>{
    myPhone = document.getElementById("phone").value;

    await set(ref(db,"users/"+myId),{
        phone:myPhone
    });

    listenUsers();
    listenCalls();
};

// 🔥 LISTAR USUARIOS
function listenUsers(){
    onValue(ref(db,"users"),snap=>{
        let html="";
        const data = snap.val();

        for(let id in data){
            if(id===myId) continue;

            html += `<div>
            ${data[id].phone}
            <button onclick="call('${id}')">Llamar</button>
            </div>`;
        }

        document.getElementById("users").innerHTML = html;
    });
}

// 🔥 LLAMAR
window.call = async (id)=>{
    isCaller=true;

    await getMedia();
    createPC();

    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    callId = push(ref(db,"calls")).key;

    await set(ref(db,"calls/"+callId),{
        caller:myId,
        callee:id,
        offer
    });

    log("📤 OFFER");

    onValue(ref(db,"calls/"+callId+"/answer"), async snap=>{
        const ans = snap.val();
        if(ans){
            await pc.setRemoteDescription(ans);
            log("📥 ANSWER");
        }
    });

    onValue(ref(db,"calls/"+callId+"/callee"), snap=>{
        const data = snap.val();
        if(data){
            Object.values(data).forEach(c=>pc.addIceCandidate(c));
        }
    });
};

// 🔥 RECIBIR LLAMADA
function listenCalls(){
    onValue(ref(db,"calls"), async snap=>{
        const calls = snap.val();
        if(!calls) return;

        for(let id in calls){
            const c = calls[id];

            if(c.callee===myId && !callId){
                callId=id;

                log("📞 ENTRANTE");

                await getMedia();
                createPC();

                localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

                await pc.setRemoteDescription(c.offer);

                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);

                await update(ref(db,"calls/"+id),{answer:ans});

                log("📤 ANSWER");

                onValue(ref(db,"calls/"+id+"/caller"), snap=>{
                    const data = snap.val();
                    if(data){
                        Object.values(data).forEach(c=>pc.addIceCandidate(c));
                    }
                });
            }
        }
    });
}

// 🔥 FORZAR AUDIO
window.forcePlay = ()=>{
    remoteVideo.play()
    .then(()=>log("▶️ PLAY manual OK"))
    .catch(e=>log("❌ PLAY manual error: "+e.message));
};

// 🔥 COLGAR
window.hangup = async ()=>{
    if(callId){
        await remove(ref(db,"calls/"+callId));
        pc.close();
        callId=null;
        remoteVideo.srcObject=null;
        log("🔴 FIN");
    }
};

// 🔥 CLICK GLOBAL
document.body.addEventListener("click", ()=>{
    if(remoteVideo.srcObject){
        remoteVideo.play().catch(()=>{});
    }
});

</script>

</body>
</html>
